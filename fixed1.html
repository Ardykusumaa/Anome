<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anome — Custom Fidget Clicker</title>
  <meta name="description" content="Custom fidget clicker dengan nama & warna pilihanmu. 3D Print by Anome, Sidoarjo." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #E05A3A;
      --black: #1a1a1a;
      --bg: #F5F3EF;
      --white: #ffffff;
      --border: #e8e4de;
      --muted: #aaaaaa;
      --surface: #faf9f7;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--black);
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 32px;
      background: var(--white);
      border-bottom: 1px solid var(--border);
    }

    .brand {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 22px;
      letter-spacing: -0.5px;
      color: var(--black);
    }
    .brand span { color: var(--accent); }

    .header-tag {
      background: var(--black);
      color: var(--white);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.5px;
      padding: 4px 10px;
      border-radius: 20px;
      text-transform: uppercase;
    }

    /* ── LAYOUT ── */
    .app {
      display: grid;
      grid-template-columns: 1fr 340px;
      height: calc(100vh - 57px - 60px);
    }

    /* ── PREVIEW PANEL ── */
    .preview-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      background: var(--bg);
      gap: 20px;
    }

    .preview-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--muted);
    }

    #preview-svg {
      width: 100%;
      max-width: 440px;
      filter: drop-shadow(0px 20px 48px rgba(0,0,0,0.13));
    }

    /* ── CONTROL PANEL ── */
    .control-panel {
      background: var(--white);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .section {
      padding: 16px 20px;
      border-bottom: 1px solid #f0ece6;
    }

    .section-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    /* Input teks */
    .text-input-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .text-input-row input {
      flex: 1;
      font-family: 'Archivo Black', sans-serif;
      font-size: 15px;
      letter-spacing: 3px;
      text-transform: uppercase;
      border: 2px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      background: var(--surface);
      color: var(--black);
      outline: none;
      transition: border-color 0.2s;
    }
    .text-input-row input:focus { border-color: var(--accent); }

    .char-count {
      font-size: 12px;
      color: #bbb;
      font-weight: 600;
      min-width: 30px;
      text-align: right;
    }
    .char-count.warn { color: var(--accent); }

    /* Swatches */
    .color-swatches {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .swatch {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    .swatch:hover { transform: scale(1.18); }
    .swatch.active { border-color: var(--black); transform: scale(1.12); }
    .swatch.light { border-color: #ddd; }
    .swatch.light.active { border-color: #888; }

    /* Caps grid */
    .caps-grid {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .cap-btn {
      width: 34px;
      height: 34px;
      border-radius: 6px;
      border: 2px solid var(--border);
      font-family: 'Archivo Black', sans-serif;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--white);
      transition: all 0.15s;
      color: var(--black);
    }
    .cap-btn:hover { transform: scale(1.08); }
    .cap-btn.selected { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(224,90,58,0.2); }

    .cap-color-label {
      font-size: 10px;
      color: var(--muted);
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    /* Toggle huruf */
    .letter-color-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--surface);
      border-radius: 8px;
      border: 1.5px solid #f0ece6;
    }
    .letter-color-label { font-size: 13px; color: #666; flex: 1; }

    .toggle-group {
      display: flex;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }
    .toggle-btn {
      padding: 5px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      background: transparent;
      color: #999;
      transition: all 0.15s;
      font-family: 'DM Sans', sans-serif;
    }
    .toggle-btn.active { background: var(--black); color: var(--white); }

    .no-hint { font-size: 12px; color: #ccc; padding: 6px 0; }

    /* ── ORDER BAR ── */
    .order-bar {
      height: 60px;
      background: var(--black);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      gap: 16px;
      flex-shrink: 0;
    }

    .order-info { min-width: 0; flex: 1; }

    .order-text {
      font-size: 10px;
      color: #555;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 500px;
    }

    .order-sub { font-size: 10px; color: #3a3a3a; margin-top: 2px; }

    .order-right { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }

    .order-price {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 20px;
      color: var(--white);
      white-space: nowrap;
    }

    .wa-btn {
      background: #25D366;
      color: var(--white);
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      transition: opacity 0.2s;
      white-space: nowrap;
      font-family: 'DM Sans', sans-serif;
    }
    .wa-btn:hover { opacity: 0.88; }
    .wa-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
        height: auto;
      }
      .preview-panel { padding: 24px 16px; min-height: 280px; }
      .control-panel { max-height: none; border-left: none; border-top: 1px solid var(--border); }
      .order-bar { padding: 0 16px; }
      .order-text { max-width: 180px; }
    }
  </style>
</head>
<body>

<header>
  <div class="brand">AN<span>O</span>ME</div>
  <div class="header-tag">Custom Fidget Clicker</div>
</header>

<div class="app">
  <!-- Preview -->
  <div class="preview-panel">
    <div class="preview-label">Preview Produk</div>
    <svg id="preview-svg" viewBox="0 0 440 300" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>

  <!-- Controls -->
  <div class="control-panel">
    <div class="section">
      <div class="section-title">Nama / Teks</div>
      <div class="text-input-row">
        <input type="text" id="name-input" maxlength="8" placeholder="NAMA" value="ANOME" autocomplete="off" />
        <div class="char-count" id="char-count">5/8</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Warna Base</div>
      <div class="color-swatches" id="base-swatches"></div>
    </div>

    <div class="section">
      <div class="section-title">Warna Caps</div>
      <div id="caps-section"><div class="no-hint">Ketik nama dulu</div></div>
    </div>

    <div class="section">
      <div class="section-title">Warna Huruf</div>
      <div class="letter-color-row">
        <div class="letter-color-label">Semua huruf</div>
        <div class="toggle-group">
          <button class="toggle-btn active" id="btn-black" onclick="setLetterColor('black')">Hitam</button>
          <button class="toggle-btn" id="btn-white" onclick="setLetterColor('white')">Putih</button>
        </div>
      </div>
    </div>

    <div class="section" style="background:#fdf9f6; border-radius:0;">
      <div class="section-title">Estimasi Harga</div>
      <div style="font-size:12px; color:#888; line-height:1.7;">
        Base 1–4 karakter: <strong>Rp 20.000</strong><br/>
        Base 5–8 karakter: <strong>Rp 35.000</strong><br/>
        Per caps/karakter: <strong>+ Rp 10.000</strong>
      </div>
    </div>
  </div>
</div>

<!-- Order Bar -->
<div class="order-bar">
  <div class="order-info">
    <div class="order-text" id="order-text">—</div>
    <div class="order-sub">Format order</div>
  </div>
  <div class="order-right">
    <div class="order-price" id="order-price">Rp 0</div>
    <button class="wa-btn" id="wa-btn" onclick="pesan()" disabled>
      <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
      </svg>
      Pesan via WA
    </button>
  </div>
</div>

<script>
const COLORS = [
  { id:'white',      hex:'#ffffff', label:'White',       light:true },
  { id:'cream',      hex:'#f9f1d7', label:'Cream',       light:true },
  { id:'beige',      hex:'#f5d5c0', label:'Beige',       light:true },
  { id:'pink',       hex:'#f59aa7', label:'Pink',        light:true },
  { id:'yellow',     hex:'#fed402', label:'Yellow',      light:true },
  { id:'golden',     hex:'#f1ac2d', label:'Golden',      light:true },
  { id:'orange',     hex:'#fd7c18', label:'Orange' },
  { id:'watermelon', hex:'#e05174', label:'Watermelon' },
  { id:'red',        hex:'#c13a3d', label:'Red' },
  { id:'redengine',  hex:'#b72b44', label:'Red Engine' },
  { id:'mint',       hex:'#b2ddcb', label:'Mint',        light:true },
  { id:'acidgreen',  hex:'#6bbe45', label:'Acid Green' },
  { id:'holygreen',  hex:'#256740', label:'Holy Green' },
  { id:'cyan',       hex:'#20afc5', label:'Cyan' },
  { id:'blue',       hex:'#225fac', label:'Blue' },
  { id:'lavender',   hex:'#8c74b5', label:'Lavender' },
  { id:'purple',     hex:'#8a2474', label:'Purple' },
  { id:'brown',      hex:'#61473f', label:'Brown' },
  { id:'black',      hex:'#0d0e11', label:'Black' },
];

let state = {
  text: 'ANOME',
  baseColor: COLORS.find(c => c.id === 'watermelon'),
  capColors: {},
  letterColor: 'black',
  selectedCapIdx: null,
};

function darken(hex, amt) {
  let r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  r=Math.max(0,Math.round(r*(1-amt))); g=Math.max(0,Math.round(g*(1-amt))); b=Math.max(0,Math.round(b*(1-amt)));
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

function calcPrice(n) {
  if (!n) return 0;
  return (n <= 4 ? 20000 : 35000) + n * 10000;
}

function syncCapColors() {
  const letters = state.text.split('');
  const next = {};
  letters.forEach((l,i) => { next[i] = state.capColors[i] || COLORS.find(c=>c.id==='white'); });
  state.capColors = next;
}

function makeSwatch(c, active, onClick) {
  const sw = document.createElement('div');
  sw.className = 'swatch' + (active?' active':'') + (c.light?' light':'');
  sw.style.background = c.hex;
  sw.title = c.label;
  sw.onclick = onClick;
  return sw;
}

function renderBaseSwatches() {
  const el = document.getElementById('base-swatches');
  el.innerHTML = '';
  COLORS.forEach(c => el.appendChild(makeSwatch(c, state.baseColor.id===c.id, () => {
    state.baseColor = c; renderBaseSwatches(); renderPreview(); renderOrderBar();
  })));
}

function renderCapsSection() {
  const sec = document.getElementById('caps-section');
  const letters = state.text.split('');
  if (!letters.length) { sec.innerHTML='<div class="no-hint">Ketik nama dulu</div>'; return; }
  sec.innerHTML = '';

  const grid = document.createElement('div');
  grid.className = 'caps-grid';
  letters.forEach((l,i) => {
    const cc = state.capColors[i] || COLORS.find(c=>c.id==='white');
    const btn = document.createElement('div');
    btn.className = 'cap-btn' + (state.selectedCapIdx===i?' selected':'');
    btn.style.background = cc.hex;
    btn.style.color = state.letterColor==='black' ? '#1a1a1a' : '#fff';
    if (cc.light) btn.style.borderColor = '#ddd';
    btn.textContent = l;
    btn.onclick = () => { state.selectedCapIdx = state.selectedCapIdx===i ? null : i; renderCapsSection(); };
    grid.appendChild(btn);
  });
  sec.appendChild(grid);

  if (state.selectedCapIdx !== null && state.selectedCapIdx < letters.length) {
    const lbl = document.createElement('div');
    lbl.className = 'cap-color-label';
    lbl.textContent = `Warna caps "${letters[state.selectedCapIdx]}"`;
    sec.appendChild(lbl);
    const sw = document.createElement('div');
    sw.className = 'color-swatches';
    COLORS.forEach(c => sw.appendChild(makeSwatch(c, (state.capColors[state.selectedCapIdx]||{}).id===c.id, () => {
      state.capColors[state.selectedCapIdx] = c;
      renderCapsSection(); renderPreview(); renderOrderBar();
    })));
    sec.appendChild(sw);
  }
}

function setLetterColor(color) {
  state.letterColor = color;
  document.getElementById('btn-black').className = 'toggle-btn'+(color==='black'?' active':'');
  document.getElementById('btn-white').className = 'toggle-btn'+(color==='white'?' active':'');
  renderCapsSection(); renderPreview(); renderOrderBar();
}

function renderPreview() {
  const svg = document.getElementById('preview-svg');
  const letters = state.text.split('');
  const n = letters.length;

  const fontFace = `<defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap');.kl{font-family:'Archivo Black',sans-serif;font-size:17px;font-weight:900;}</style>
    <filter id="bShadow" x="-5%" y="-5%" width="115%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="rgba(0,0,0,0.28)"/>
    </filter>
    <filter id="cShadow" x="-8%" y="-8%" width="120%" height="135%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.22)"/>
    </filter>
  </defs>`;

  if (!n) { svg.innerHTML = fontFace; return; }

  // Front-facing perspective matching PNG reference
  const capW = 50;
  const capH = 52;
  const capGap = 6;
  const capBotH = 13;   // bottom foot depth
  const capBotInset = 6; // foot narrower than face

  const baseTopH = 32;
  const baseBotH = 20;
  const baseBotInset = 0;
  const basePad = 18;
  const baseR = 10;

  const totalCapW = n * (capW + capGap) - capGap;
  const baseW = totalCapW + basePad * 2;
  const bx = (440 - baseW) / 2;
  const baseTopY = 218;

  const bc = state.baseColor.hex;
  const bcTop = bc;
  const bcBot = darken(bc, 0.32);

  let out = fontFace;

  // ── BASE bottom rounded face ──
  out += `<rect x="${bx}" y="${baseTopY + baseTopH - baseR}" width="${baseW}" height="${baseBotH + baseR}" rx="${baseR}" fill="${bcBot}"/>`;
  // ── BASE top face ──
  out += `<rect x="${bx}" y="${baseTopY}" width="${baseW}" height="${baseTopH}" rx="${baseR}" fill="${bcTop}" filter="url(#bShadow)"/>`;
  // Highlight strip
  out += `<rect x="${bx+12}" y="${baseTopY+5}" width="${baseW-24}" height="4" rx="2" fill="rgba(255,255,255,0.28)"/>`;

  // ── CAPS ──
  const capStartX = bx + basePad;

  letters.forEach((l, i) => {
    const cc = (state.capColors[i] || COLORS.find(c => c.id === 'white')).hex;
    const ccBot = darken(cc, 0.30);
    const ccDish = darken(cc, 0.09);
    const tc = state.letterColor === 'black' ? '#111' : '#fff';

    const cx = capStartX + i * (capW + capGap);
    const cy = baseTopY - capH - capBotH - 2;

    // Cap foot (bottom trapezoid)
    out += `<path d="M${cx+capBotInset},${cy+capH} L${cx+capW-capBotInset},${cy+capH} L${cx+capW},${cy+capH+capBotH} L${cx},${cy+capH+capBotH} Z" fill="${ccBot}" stroke="none"/>`;

    // Cap main face — flat front with slight bevel top corners
    const bev = 5;
    out += `<path d="M${cx+bev},${cy} L${cx+capW-bev},${cy} L${cx+capW},${cy+bev} L${cx+capW},${cy+capH} L${cx},${cy+capH} L${cx},${cy+bev} Z" fill="${cc}" filter="url(#cShadow)"/>`;

    // Inner dish (recessed square)
    const di = 7, dt = 9;
    out += `<rect x="${cx+di}" y="${cy+dt}" width="${capW-di*2}" height="${capH-dt-di}" rx="3" fill="${ccDish}"/>`;

    // Shine
    out += `<rect x="${cx+di}" y="${cy+dt}" width="${capW-di*2}" height="4" rx="2" fill="rgba(255,255,255,0.25)"/>`;

    // Letter
    out += `<text x="${cx+capW/2}" y="${cy+capH/2+7}" text-anchor="middle" class="kl" fill="${tc}">${l}</text>`;
  });

  svg.innerHTML = out;
}

function renderOrderBar() {
  const letters = state.text.split('');
  const n = letters.length;
  const btn = document.getElementById('wa-btn');
  if (!n) {
    document.getElementById('order-text').textContent = '—';
    document.getElementById('order-price').textContent = 'Rp 0';
    btn.disabled = true; return;
  }
  const capStr = letters.map((l,i) => {
    const c = state.capColors[i]||COLORS.find(x=>x.id==='white');
    return `${l}[${c.label}]`;
  }).join(', ');
  const orderStr = `[${state.text}] Base: ${state.baseColor.label} | Caps: ${capStr} | Huruf: ${state.letterColor==='black'?'Hitam':'Putih'}`;
  document.getElementById('order-text').textContent = orderStr;
  document.getElementById('order-price').textContent = 'Rp '+calcPrice(n).toLocaleString('id-ID');
  btn.disabled = false;
}

function pesan() {
  const order = document.getElementById('order-text').textContent;
  const price = document.getElementById('order-price').textContent;
  const msg = encodeURIComponent(
    `Halo Anome! Saya mau pesan fidget clicker custom 🎉\n\n` +
    `Detail pesanan:\n${order}\n\n` +
    `Estimasi total: ${price}\n\n` +
    `Mohon konfirmasi ketersediaan & DP. Terima kasih!`
  );
  window.open('https://wa.me/6208999215589?text='+msg, '_blank');
}

document.getElementById('name-input').addEventListener('input', function() {
  const val = this.value.replace(/[^a-zA-Z0-9]/g,'').slice(0,8).toUpperCase();
  this.value = val;
  state.text = val;
  const cc = document.getElementById('char-count');
  cc.textContent = val.length+'/8';
  cc.className = 'char-count'+(val.length>=7?' warn':'');
  syncCapColors();
  if (state.selectedCapIdx!==null && state.selectedCapIdx>=val.length) state.selectedCapIdx=null;
  renderCapsSection(); renderPreview(); renderOrderBar();
});

// Init
syncCapColors();
renderBaseSwatches();
renderCapsSection();
renderPreview();
renderOrderBar();
</script>

</body>
</html>
